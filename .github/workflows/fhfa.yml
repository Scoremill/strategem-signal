name: Monthly FHFA House Price Index

on:
  schedule:
    # 22nd of each month at 6:30 AM CT (11:30 UTC)
    # Fires 15 min after market-opportunity so the three scoring jobs
    # (portfolio-health, market-opportunity, fhfa) stagger cleanly on
    # the same day.
    - cron: '30 11 22 * *'
  workflow_dispatch:

jobs:
  fetch-fhfa-hpi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Refresh FHFA HPI
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.APP_URL }}/api/cron/fhfa" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "FHFA response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::FHFA fetch failed with HTTP $HTTP_CODE"
            exit 1
          fi
